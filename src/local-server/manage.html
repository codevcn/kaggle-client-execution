<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản Lý Flow & Cấu Hình - Local Server</title>
    <style>
      :root {
        --bg-color: #0f111a;
        --card-bg: rgba(255, 255, 255, 0.05);
        --card-border: rgba(255, 255, 255, 0.1);
        --text-main: #e2e8f0;
        --text-muted: #94a3b8;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --danger: #ef4444;
        --success: #10b981;
        --input-bg: rgba(0, 0, 0, 0.2);
        --input-border: rgba(255, 255, 255, 0.2);
        --transition: all 0.2s ease-in-out;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        line-height: 1.6;
        padding: 0;
        overflow-x: hidden;
      }

      header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(15, 17, 26, 0.85);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--card-border);
        padding: 1rem 2rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        letter-spacing: -0.025em;
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .btn {
        padding: 0.5rem 1rem;
        border: none;
        border-radius: 6px;
        font-weight: 500;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        transition: var(--transition);
        font-size: 0.9rem;
      }

      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .btn-primary {
        background-color: var(--primary);
        color: white;
      }

      .btn-primary:hover:not(:disabled) {
        background-color: var(--primary-hover);
        box-shadow: 0 0 12px rgba(59, 130, 246, 0.5);
      }

      .btn-danger {
        background-color: rgba(239, 68, 68, 0.15);
        color: var(--danger);
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
      .btn-danger:hover:not(:disabled) {
        background-color: var(--danger);
        color: white;
      }

      .btn-outline {
        background: transparent;
        border: 1px solid var(--input-border);
        color: var(--text-main);
      }
      .btn-outline:hover:not(:disabled) {
        background: var(--card-bg);
        border-color: var(--text-muted);
      }

      .btn-success {
        background-color: var(--success);
        color: white;
      }
      .btn-success:hover:not(:disabled) {
        background-color: #059669;
        box-shadow: 0 0 12px rgba(16, 185, 129, 0.5);
      }

      main {
        padding: 2rem;
        max-width: 1200px;
        margin: 0 auto;
      }

      #loading-indicator {
        text-align: center;
        padding: 4rem;
        font-size: 1.2rem;
        color: var(--text-muted);
      }

      .flow-list {
        display: flex;
        flex-direction: column;
        gap: 1.5rem;
      }

      .flow-card {
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 12px;
        padding: 1.5rem;
        position: relative;
        transition: var(--transition);
        backdrop-filter: blur(8px);
      }

      .flow-card:hover {
        border-color: rgba(255, 255, 255, 0.25);
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
      }

      .flow-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid var(--card-border);
      }

      .flow-header h2 {
        font-size: 1.25rem;
        color: var(--primary);
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .form-control {
        width: 100%;
        padding: 0.6rem 0.8rem;
        background-color: var(--input-bg);
        border: 1px solid var(--input-border);
        border-radius: 6px;
        color: var(--text-main);
        font-family: inherit;
        font-size: 0.95rem;
        transition: var(--transition);
      }

      .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
      }

      /* Style dropdown options */
      option {
        background-color: var(--bg-color);
        color: var(--text-main);
      }

      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
      }

      .section-title {
        font-size: 1.1rem;
        margin-top: 1.5rem;
        margin-bottom: 1rem;
        color: #cbd5e1;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }
      .section-title::before {
        content: "";
        display: block;
        width: 4px;
        height: 1.1rem;
        background: var(--primary);
        border-radius: 2px;
      }

      /* Switch styling */
      .switch-wrapper {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      .switch {
        position: relative;
        display: inline-block;
        width: 44px;
        height: 24px;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #475569;
        transition: 0.3s;
        border-radius: 34px;
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background-color: white;
        transition: 0.3s;
        border-radius: 50%;
      }

      input:checked + .slider {
        background-color: var(--primary);
      }

      input:checked + .slider:before {
        transform: translateX(20px);
      }

      /* Notebook List */
      .notebook-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-top: 0.5rem;
      }

      .notebook-card {
        border: 1px solid var(--input-border);
        border-radius: 8px;
        padding: 1rem;
        background: rgba(0, 0, 0, 0.15);
        transition: var(--transition);
        position: relative;
      }

      .notebook-card.active {
        border-color: var(--primary);
        background: rgba(59, 130, 246, 0.07);
        box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.25);
      }

      .notebook-card-header {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }

      .notebook-radio-label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        cursor: pointer;
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text-muted);
        flex: 1;
      }

      .notebook-radio-label input[type="radio"] {
        accent-color: var(--primary);
        width: 15px;
        height: 15px;
        cursor: pointer;
      }

      .notebook-card.active .notebook-radio-label {
        color: #60a5fa;
      }

      .active-badge {
        font-size: 0.72rem;
        font-weight: 700;
        padding: 0.15rem 0.5rem;
        border-radius: 20px;
        background: rgba(59, 130, 246, 0.2);
        color: #60a5fa;
        border: 1px solid rgba(59, 130, 246, 0.4);
        letter-spacing: 0.04em;
      }

      .notebook-edit-vars {
        margin-top: 0.75rem;
        padding-top: 0.75rem;
        border-top: 1px solid var(--card-border);
      }

      .notebook-edit-vars-title {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--text-muted);
        margin-bottom: 0.5rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      /* Dynamic Lists */

      .dynamic-list {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      .dynamic-item {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }
      .dynamic-item .form-control {
        flex: 1;
      }
      .btn-icon {
        padding: 0.5rem;
        background: transparent;
        border: 1px solid var(--input-border);
        color: var(--text-muted);
        border-radius: 6px;
        cursor: pointer;
        transition: var(--transition);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .btn-icon:hover {
        background: rgba(255, 255, 255, 0.1);
        color: white;
      }
      .btn-icon.danger:hover {
        background: rgba(239, 68, 68, 0.2);
        color: var(--danger);
        border-color: rgba(239, 68, 68, 0.4);
      }

      .add-flow-wrapper {
        margin-top: 2rem;
        text-align: center;
      }

      /* Toast */
      #toast-container {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        z-index: 1000;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .toast {
        background: rgba(15, 17, 26, 0.95);
        border-left: 4px solid var(--success);
        color: white;
        padding: 1rem 1.5rem;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        transform: translateX(120%);
        opacity: 0;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      .toast.show {
        transform: translateX(0);
        opacity: 1;
      }
      .toast.error {
        border-left-color: var(--danger);
      }

      /* Terminal Modal Styling */
      .modal-backdrop {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        z-index: 1000;
        display: none;
        align-items: center;
        justify-content: center;
      }

      .terminal-modal {
        width: 90%;
        max-width: 850px;
        height: 80%;
        max-height: 600px;
        background: #090d16;
        border: 1px solid var(--card-border);
        border-radius: 12px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }

      @keyframes modalFadeIn {
        from {
          transform: scale(0.95);
          opacity: 0;
        }
        to {
          transform: scale(1);
          opacity: 1;
        }
      }

      .terminal-header {
        padding: 0.75rem 1.5rem;
        background: #0f172a;
        border-bottom: 1px solid var(--card-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .terminal-title {
        font-family: "Fira Code", monospace;
        font-size: 0.9rem;
        color: #3b82f6;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .terminal-status {
        font-size: 0.8rem;
        padding: 0.2rem 0.6rem;
        border-radius: 20px;
        font-weight: 600;
      }

      .status-running {
        background: rgba(59, 130, 246, 0.15);
        color: #60a5fa;
        border: 1px solid rgba(59, 130, 246, 0.3);
      }

      .status-success {
        background: rgba(16, 185, 129, 0.15);
        color: #34d399;
        border: 1px solid rgba(16, 185, 129, 0.3);
      }

      .status-failed {
        background: rgba(239, 68, 68, 0.15);
        color: #f87171;
        border: 1px solid rgba(239, 68, 68, 0.3);
      }

      .status-stopped {
        background: rgba(245, 158, 11, 0.15);
        color: #fbbf24;
        border: 1px solid rgba(245, 158, 11, 0.3);
      }

      .terminal-body {
        flex: 1;
        padding: 1.25rem;
        overflow-y: auto;
        font-family: "Fira Code", "Courier New", Courier, monospace;
        font-size: 0.85rem;
        color: #f1f5f9;
        line-height: 1.5;
        background: #060913;
      }

      .terminal-line {
        white-space: pre-wrap;
        margin-bottom: 0.25rem;
      }

      .terminal-line.error {
        color: #f87171;
      }
      .terminal-line.info {
        color: #38bdf8;
      }
      .terminal-line.success {
        color: #34d399;
      }
      .terminal-line.warning {
        color: #fbbf24;
      }

      .terminal-footer {
        padding: 0.75rem 1.5rem;
        background: #0f172a;
        border-top: 1px solid var(--card-border);
        display: flex;
        justify-content: flex-end;
        gap: 0.75rem;
      }

      /* Floating Run Button */
      .fab-run {
        position: fixed;
        bottom: 2rem;
        left: 2rem;
        z-index: 500;
        display: flex;
        align-items: center;
        gap: 0.65rem;
        padding: 0.85rem 1.5rem;
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
        border: none;
        border-radius: 50px;
        font-size: 0.95rem;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        box-shadow: 0 4px 20px rgba(16, 185, 129, 0.45), 0 0 0 0 rgba(16, 185, 129, 0.4);
        transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        animation: fab-pulse 2.8s ease-in-out infinite;
      }

      .fab-run:hover:not(:disabled) {
        transform: translateY(-3px) scale(1.04);
        box-shadow: 0 8px 32px rgba(16, 185, 129, 0.6), 0 0 0 0 rgba(16, 185, 129, 0);
        animation: none;
      }

      .fab-run:active:not(:disabled) {
        transform: translateY(-1px) scale(1.01);
      }

      .fab-run:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        animation: none;
        box-shadow: none;
      }

      .fab-run .fab-icon {
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }

      @keyframes fab-pulse {
        0%   { box-shadow: 0 4px 20px rgba(16,185,129,0.45), 0 0 0 0 rgba(16,185,129,0.4); }
        60%  { box-shadow: 0 4px 20px rgba(16,185,129,0.45), 0 0 0 12px rgba(16,185,129,0); }
        100% { box-shadow: 0 4px 20px rgba(16,185,129,0.45), 0 0 0 0 rgba(16,185,129,0); }
      }

      /* GDrive URLs Button */
      .btn-gdrive {
        background: rgba(234, 179, 8, 0.12);
        color: #fbbf24;
        border: 1px solid rgba(234, 179, 8, 0.3);
      }
      .btn-gdrive:hover:not(:disabled) {
        background: rgba(234, 179, 8, 0.22);
        border-color: rgba(234, 179, 8, 0.6);
        box-shadow: 0 0 12px rgba(234, 179, 8, 0.2);
      }

      /* GDrive URLs Modal */
      .gdrive-modal {
        width: 90%;
        max-width: 780px;
        max-height: 80vh;
        background: #0d1117;
        border: 1px solid var(--card-border);
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        animation: modalFadeIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .gdrive-modal-header {
        padding: 1rem 1.5rem;
        background: #0f172a;
        border-bottom: 1px solid var(--card-border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .gdrive-modal-title {
        font-size: 1rem;
        font-weight: 600;
        color: #fbbf24;
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      .gdrive-modal-body {
        flex: 1;
        overflow-y: auto;
        padding: 0;
      }

      .gdrive-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }

      .gdrive-table thead tr {
        background: rgba(255, 255, 255, 0.04);
        border-bottom: 1px solid var(--card-border);
      }

      .gdrive-table th {
        padding: 0.75rem 1.25rem;
        text-align: left;
        font-weight: 600;
        font-size: 0.8rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .gdrive-table td {
        padding: 0.75rem 1.25rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        vertical-align: middle;
      }

      .gdrive-table tbody tr:last-child td {
        border-bottom: none;
      }

      .gdrive-table tbody tr:hover {
        background: rgba(255, 255, 255, 0.03);
      }

      .gdrive-name-badge {
        display: inline-block;
        background: rgba(251, 191, 36, 0.1);
        color: #fbbf24;
        border: 1px solid rgba(251, 191, 36, 0.25);
        border-radius: 5px;
        padding: 0.2rem 0.6rem;
        font-size: 0.82rem;
        font-weight: 600;
        white-space: nowrap;
      }

      .gdrive-url-cell {
        font-family: 'Fira Code', monospace;
        font-size: 0.78rem;
        color: #94a3b8;
        word-break: break-all;
      }

      .gdrive-url-cell a {
        color: #60a5fa;
        text-decoration: none;
      }
      .gdrive-url-cell a:hover {
        text-decoration: underline;
      }

      .gdrive-actions {
        display: flex;
        gap: 0.4rem;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="9" y1="3" x2="9" y2="21"></line>
        </svg>
        Quản Lý Flow & Cấu Hình
      </h1>
      <div style="display: flex; gap: 0.75rem">
        <button class="btn btn-gdrive" onclick="openGdriveModal()" title="Xem danh sách GDrive URLs có sẵn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            <line x1="12" y1="11" x2="12" y2="17"></line>
            <line x1="9" y1="14" x2="15" y2="14"></line>
          </svg>
          GDrive URLs
        </button>
        <button class="btn btn-primary" onclick="saveConfig()">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"
            />
            <polyline points="17 21 17 13 7 13 7 21" />
            <polyline points="7 3 7 8 15 8" />
          </svg>
          Lưu Cấu Hình
        </button>
      </div>
    </header>

    <main>
      <div id="loading-indicator">Đang tải dữ liệu cấu hình...</div>
      <div id="config-container" style="display: none">
        <div class="flow-list" id="flow-list"></div>
        <div class="add-flow-wrapper">
          <button class="btn btn-outline" onclick="addFlow()">
            + Thêm Flow Mới
          </button>
        </div>
      </div>
    </main>

    <div id="toast-container"></div>

    <!-- Floating Run All Flows Button -->
    <button class="fab-run" id="btn-run-all" onclick="runAllFlows()" title="Chạy tất cả flow">
      <span class="fab-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"></polygon>
        </svg>
      </span>
      Chạy Tất Cả Flow
    </button>

    <!-- GDrive URLs Modal -->
    <div class="modal-backdrop" id="gdrive-modal-backdrop" onclick="closeGdriveModal(event)">
      <div class="gdrive-modal">
        <div class="gdrive-modal-header">
          <div class="gdrive-modal-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
            </svg>
            GDrive URLs có sẵn
          </div>
          <button class="btn-icon" onclick="closeGdriveModal()" style="padding:0.4rem; color:var(--text-muted)" title="Đóng">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
        <div class="gdrive-modal-body">
          <table class="gdrive-table" id="gdrive-table">
            <thead>
              <tr>
                <th style="width:30%">Tên</th>
                <th>URL</th>
                <th style="width:90px">Thao tác</th>
              </tr>
            </thead>
            <tbody id="gdrive-table-body">
              <!-- Rendered by JS -->
            </tbody>
          </table>
          <p id="gdrive-empty" style="display:none; color:var(--text-muted); font-style:italic; padding:1.5rem; text-align:center">Không có URL nào được cấu hình.</p>
        </div>
      </div>
    </div>

    <!-- Terminal Modal -->
    <div class="modal-backdrop" id="terminal-modal-backdrop">
      <div class="terminal-modal">
        <div class="terminal-header">
          <div class="terminal-title">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="margin-right: 4px"
            >
              <polyline points="4 17 10 11 4 5"></polyline>
              <line x1="12" y1="19" x2="20" y2="19"></line>
            </svg>
            kaggle-client-execution:~$ ./run_all_flows.cmd
          </div>
          <div
            id="terminal-status-badge"
            class="terminal-status status-running"
          >
            Đang chạy
          </div>
        </div>
        <div class="terminal-body" id="terminal-body">
          <div class="terminal-line info">
            [SYSTEM] Đang khởi tạo kết nối để chạy flow...
          </div>
        </div>
        <div class="terminal-footer">
          <button
            class="btn btn-danger"
            id="btn-stop-flow"
            onclick="stopAllFlows()"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            </svg>
            Dừng Flow
          </button>
          <button
            class="btn btn-outline"
            id="btn-close-terminal"
            onclick="closeTerminalModal()"
            disabled
          >
            Đóng
          </button>
        </div>
      </div>
    </div>

    <script>
      let configData = { flows: [] };
      let availableFilters = [];
      let pollInterval = null;
      let logOffset = 0;

      // Khởi tạo
      document.addEventListener("DOMContentLoaded", fetchConfig);

      async function fetchConfig() {
        try {
          const [configRes, filtersRes] = await Promise.all([
            fetch("/api/configs"),
            fetch("/api/available-filters"),
          ]);
          if (!configRes.ok) throw new Error("Không thể tải cấu hình");
          configData = await configRes.json();
          if (filtersRes.ok) {
            availableFilters = await filtersRes.json();
          }

          document.getElementById("loading-indicator").style.display = "none";
          document.getElementById("config-container").style.display = "block";

          renderFlows();
        } catch (error) {
          showToast(error.message, "error");
          document.getElementById("loading-indicator").innerHTML =
            `<span style="color:var(--danger)">Lỗi: ${error.message}</span>`;
        }
      }

      function renderFlows() {
        const container = document.getElementById("flow-list");
        container.innerHTML = "";

        configData.flows.forEach((flow, index) => {
          const card = document.createElement("div");
          card.className = "flow-card";
          card.innerHTML = `
          <div class="flow-header">
            <h2>Flow #${index + 1}: <span id="title-display-${index}" style="color:var(--text-main); font-weight:500; font-size:1.1rem">${flow.flow_title || "Mới"}</span></h2>
            <button class="btn btn-danger" onclick="removeFlow(${index})">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
              Xóa Flow
            </button>
          </div>
          
          <div class="switch-wrapper">
            <label class="switch">
              <input type="checkbox" id="enable-${index}" ${!flow.skip ? "checked" : ""} onchange="updateFlowData(${index}, 'skip', !this.checked)">
              <span class="slider"></span>
            </label>
            <span style="color:var(--text-muted); font-weight:500">Bật flow này (Không skip flow này)</span>
          </div>

          <div class="form-group">
            <label>Flow Title</label>
            <input type="text" class="form-control" value="${escapeHtml(flow.flow_title || "")}" oninput="updateTitleDisplay(${index}, this.value); updateFlowData(${index}, 'flow_title', this.value)">
          </div>

          <div class="form-group">
            <label>Local Data Input Path</label>
            <input type="text" class="form-control" value="${escapeHtml(flow.local_data_input || "")}" oninput="updateFlowData(${index}, 'local_data_input', this.value)">
          </div>

          <div class="grid-2">
            <div>
              <div class="section-title">Google Drive Config</div>
              <div class="form-group">
                <label>Upload Folder URL</label>
                <input type="text" class="form-control" value="${escapeHtml(flow.gdrive?.upload_gdrive_folder_url || "")}" oninput="updateNestedFlowData(${index}, 'gdrive', 'upload_gdrive_folder_url', this.value)">
              </div>
              <div class="form-group">
                <label>Rclone Config Path</label>
                <input type="text" class="form-control" value="${escapeHtml(flow.gdrive?.rclone_config_path || "")}" oninput="updateNestedFlowData(${index}, 'gdrive', 'rclone_config_path', this.value)">
              </div>
            </div>

            <div>
              <div class="section-title" style="justify-content:space-between">
                <span>Kaggle Notebooks</span>
                <button class="btn-icon" style="padding:0.2rem 0.6rem; font-size:0.85rem" onclick="addNotebook(${index})">+ Thêm notebook</button>
              </div>
              <div class="notebook-list" id="notebooks-list-${index}">
                <!-- Rendered in JS -->
              </div>
            </div>
          </div>

          <div>
            <div class="section-title">
              Entrance Filters
              <button class="btn-icon" style="margin-left:auto; padding:0.2rem 0.5rem" onclick="addEntranceFilter(${index})">+</button>
            </div>
            <div class="dynamic-list" id="filters-list-${index}">
              <!-- Rendered in JS -->
            </div>
          </div>
        `;
          container.appendChild(card);

          // Render dynamic lists
          renderEntranceFilters(index);
          renderNotebooks(index);
        });
      }

      function renderEntranceFilters(flowIndex) {
        const container = document.getElementById(`filters-list-${flowIndex}`);
        container.innerHTML = "";
        const filters = configData.flows[flowIndex].entrance_filters || [];

        if (filters.length === 0) {
          container.innerHTML = `<span style="color:var(--text-muted); font-size:0.9rem; font-style:italic">Chưa có filter nào</span>`;
        }

        filters.forEach((filter, filterIndex) => {
          let optionsHtml = '<option value="">-- Chọn Filter --</option>';
          availableFilters.forEach((f) => {
            const selected = f === filter.name ? "selected" : "";
            optionsHtml += `<option value="${escapeHtml(f)}" ${selected}>${escapeHtml(f)}</option>`;
          });

          if (filter.name && !availableFilters.includes(filter.name)) {
            optionsHtml += `<option value="${escapeHtml(filter.name)}" selected>${escapeHtml(filter.name)} (Lỗi: Không tồn tại)</option>`;
          }

          const div = document.createElement("div");
          div.className = "dynamic-item";
          div.innerHTML = `
          <select class="form-control" onchange="updateFilterName(${flowIndex}, ${filterIndex}, this.value)">
            ${optionsHtml}
          </select>
          <button class="btn-icon danger" onclick="removeEntranceFilter(${flowIndex}, ${filterIndex})" title="Xóa filter">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        `;
          container.appendChild(div);
        });
      }

      // --- Data Updaters ---
      function updateTitleDisplay(index, val) {
        document.getElementById(`title-display-${index}`).textContent =
          val || "Mới";
      }

      function updateFlowData(index, field, value) {
        configData.flows[index][field] = value;
      }

      // Deep update helper
      function updateNestedFlowData(index, parentField, field, value) {
        if (!configData.flows[index][parentField]) {
          configData.flows[index][parentField] = {};
        }
        configData.flows[index][parentField][field] = value;
      }

      // Filters
      function addEntranceFilter(flowIndex) {
        if (!configData.flows[flowIndex].entrance_filters)
          configData.flows[flowIndex].entrance_filters = [];
        configData.flows[flowIndex].entrance_filters.push({ name: "" });
        renderEntranceFilters(flowIndex);
      }
      function updateFilterName(flowIndex, filterIndex, val) {
        configData.flows[flowIndex].entrance_filters[filterIndex].name = val;
      }
      function removeEntranceFilter(flowIndex, filterIndex) {
        configData.flows[flowIndex].entrance_filters.splice(filterIndex, 1);
        renderEntranceFilters(flowIndex);
      }

      // ── Notebooks (kaggle.notbooks[]) ──────────────────────────────────────

      function getNotebooks(flowIndex) {
        const kaggle = configData.flows[flowIndex].kaggle;
        if (!kaggle) {
          configData.flows[flowIndex].kaggle = { notbooks: [] };
        }
        if (!configData.flows[flowIndex].kaggle.notbooks) {
          configData.flows[flowIndex].kaggle.notbooks = [];
        }
        return configData.flows[flowIndex].kaggle.notbooks;
      }

      function renderNotebooks(flowIndex) {
        const container = document.getElementById(
          `notebooks-list-${flowIndex}`,
        );
        if (!container) return;
        container.innerHTML = "";
        const notebooks = getNotebooks(flowIndex);

        if (notebooks.length === 0) {
          container.innerHTML = `<span style="color:var(--text-muted); font-size:0.9rem; font-style:italic">Chưa có notebook nào</span>`;
          return;
        }

        notebooks.forEach((nb, nbIndex) => {
          const isActive = nb.to_execute === true;
          const card = document.createElement("div");
          card.className = `notebook-card${isActive ? " active" : ""}`;
          card.id = `nb-card-${flowIndex}-${nbIndex}`;

          // Build edit_vars rows
          const editVars = nb.edit_vars || {};
          const editVarKeys = Object.keys(editVars);
          let editVarRowsHtml = editVarKeys
            .map(
              (key) => `
          <div class="dynamic-item" style="margin-bottom:0.4rem">
            <input type="text" class="form-control" style="flex:0.8; font-size:0.82rem; padding:0.4rem 0.6rem" value="${escapeHtml(key)}" placeholder="Key"
              onchange="updateNbEditVarKey(${flowIndex}, ${nbIndex}, '${escapeJs(key)}', this.value)">
            <input type="text" class="form-control" style="flex:1.2; font-size:0.82rem; padding:0.4rem 0.6rem" value="${escapeHtml(String(editVars[key]))}" placeholder="Value"
              oninput="updateNbEditVarValue(${flowIndex}, ${nbIndex}, '${escapeJs(key)}', this.value)">
            <button class="btn-icon danger" onclick="removeNbEditVar(${flowIndex}, ${nbIndex}, '${escapeJs(key)}')" title="Xóa biến">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
        `,
            )
            .join("");
          if (editVarKeys.length === 0) {
            editVarRowsHtml = `<span style="color:var(--text-muted); font-size:0.8rem; font-style:italic">Chưa có biến</span>`;
          }

          card.innerHTML = `
          <div class="notebook-card-header">
            <label class="notebook-radio-label">
              <input type="radio" name="nb-active-${flowIndex}" ${isActive ? "checked" : ""}
                onchange="setActiveNotebook(${flowIndex}, ${nbIndex})">
              Notebook #${nbIndex + 1}
            </label>
            ${isActive ? '<span class="active-badge">▶ SẼ CHẠY</span>' : ""}
            <button class="btn-icon danger" onclick="removeNotebook(${flowIndex}, ${nbIndex})" title="Xóa notebook" style="margin-left:auto">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            </button>
          </div>

          <div class="form-group" style="margin-bottom:0.6rem">
            <label style="font-size:0.82rem">notebook_to_execute</label>
            <input type="text" class="form-control" style="font-size:0.88rem" value="${escapeHtml(nb.notebook_to_execute || "")}"
              oninput="updateNbField(${flowIndex}, ${nbIndex}, 'notebook_to_execute', this.value)" placeholder="username/notebook-slug">
          </div>

          <div class="form-group" style="margin-bottom:0.75rem">
            <label style="font-size:0.82rem">credentials_path (.env)</label>
            <input type="text" class="form-control" style="font-size:0.88rem" value="${escapeHtml(nb.credentials_path || "")}"
              oninput="updateNbField(${flowIndex}, ${nbIndex}, 'credentials_path', this.value)" placeholder="/path/to/.env">
          </div>

          <div class="notebook-edit-vars">
            <div class="notebook-edit-vars-title">
              <span>Edit Variables</span>
              <button class="btn-icon" style="padding:0.15rem 0.5rem; font-size:0.78rem" onclick="addNbEditVar(${flowIndex}, ${nbIndex})">+</button>
            </div>
            <div id="nb-edit-vars-${flowIndex}-${nbIndex}" class="dynamic-list">
              ${editVarRowsHtml}
            </div>
          </div>
        `;

          container.appendChild(card);
        });
      }

      function setActiveNotebook(flowIndex, activeNbIndex) {
        const notebooks = getNotebooks(flowIndex);
        notebooks.forEach((nb, i) => {
          nb.to_execute = i === activeNbIndex;
        });
        renderNotebooks(flowIndex);
      }

      function addNotebook(flowIndex) {
        const notebooks = getNotebooks(flowIndex);
        // Notebook mới mặc định to_execute=false
        notebooks.push({
          notebook_to_execute: "",
          edit_vars: {},
          credentials_path: "",
          to_execute: notebooks.length === 0, // nếu là notebook đầu tiên thì mặc định active
        });
        renderNotebooks(flowIndex);
      }

      function removeNotebook(flowIndex, nbIndex) {
        const notebooks = getNotebooks(flowIndex);
        const wasActive = notebooks[nbIndex].to_execute === true;
        notebooks.splice(nbIndex, 1);
        // Nếu notebook bị xóa là active và còn notebook khác, tự set notebook đầu tiên là active
        if (wasActive && notebooks.length > 0) {
          notebooks[0].to_execute = true;
        }
        renderNotebooks(flowIndex);
      }

      function updateNbField(flowIndex, nbIndex, field, value) {
        getNotebooks(flowIndex)[nbIndex][field] = value;
      }

      // Edit vars per notebook
      function addNbEditVar(flowIndex, nbIndex) {
        const nb = getNotebooks(flowIndex)[nbIndex];
        if (!nb.edit_vars) nb.edit_vars = {};
        let newKey = "NEW_VAR";
        let counter = 1;
        while (nb.edit_vars.hasOwnProperty(newKey)) {
          newKey = `NEW_VAR_${counter++}`;
        }
        nb.edit_vars[newKey] = "";
        renderNotebooks(flowIndex);
      }

      function updateNbEditVarKey(flowIndex, nbIndex, oldKey, newKey) {
        if (oldKey === newKey) return;
        const vars = getNotebooks(flowIndex)[nbIndex].edit_vars;
        if (vars.hasOwnProperty(newKey)) {
          showToast("Key này đã tồn tại!", "error");
          renderNotebooks(flowIndex);
          return;
        }
        vars[newKey] = vars[oldKey];
        delete vars[oldKey];
        renderNotebooks(flowIndex);
      }

      function updateNbEditVarValue(flowIndex, nbIndex, key, val) {
        getNotebooks(flowIndex)[nbIndex].edit_vars[key] = val;
      }

      function removeNbEditVar(flowIndex, nbIndex, key) {
        delete getNotebooks(flowIndex)[nbIndex].edit_vars[key];
        renderNotebooks(flowIndex);
      }

      // Flows array
      function addFlow() {
        configData.flows.push({
          skip: false,
          flow_title: "Flow mới",
          entrance_filters: [],
          local_data_input: "",
          gdrive: { upload_gdrive_folder_url: "", rclone_config_path: "" },
          kaggle: {
            notbooks: [
              {
                notebook_to_execute: "",
                edit_vars: {},
                credentials_path: "",
                to_execute: true,
              },
            ],
          },
        });
        renderFlows();
        window.scrollTo({
          top: document.body.scrollHeight,
          behavior: "smooth",
        });
      }
      function removeFlow(index) {
        if (confirm("Bạn có chắc chắn muốn xóa Flow này?")) {
          configData.flows.splice(index, 1);
          renderFlows();
        }
      }

      // --- Save & Helpers ---

      // Hàm lưu cấu hình im lặng (không hiện toast), trả về true/false
      async function saveConfigSilent() {
        try {
          const response = await fetch("/api/configs", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(configData),
          });
          const result = await response.json();
          return response.ok;
        } catch (e) {
          return false;
        }
      }

      // Hàm lưu cấu hình có hiện toast thông báo (gắn với nút "Lưu Cấu Hình")
      async function saveConfig() {
        try {
          const response = await fetch("/api/configs", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(configData),
          });
          const result = await response.json();

          if (response.ok) {
            showToast("Đã lưu cấu hình thành công!");
          } else {
            showToast(result.detail || "Lỗi khi lưu", "error");
          }
        } catch (e) {
          showToast("Lỗi mạng: " + e.message, "error");
        }
      }

      // --- Run Flows & Terminal Logs ---
      async function runAllFlows() {
        // Hiển thị modal log
        const backdrop = document.getElementById("terminal-modal-backdrop");
        const terminalBody = document.getElementById("terminal-body");
        const stopBtn = document.getElementById("btn-stop-flow");
        const closeBtn = document.getElementById("btn-close-terminal");
        const statusBadge = document.getElementById("terminal-status-badge");
        const runAllBtn = document.getElementById("btn-run-all");

        backdrop.style.display = "flex";
        terminalBody.innerHTML = '<div class="terminal-line info">[SYSTEM] Đang lưu cấu hình trước khi chạy...</div>';
        statusBadge.className = "terminal-status status-running";
        statusBadge.textContent = "Lưu cấu hình...";

        stopBtn.style.display = "inline-flex";
        stopBtn.disabled = true;
        closeBtn.disabled = true;
        runAllBtn.disabled = true;

        logOffset = 0;

        // ── Bước 0: Lưu cấu hình trước khi chạy ──────────────────────────
        const saveOk = await saveConfigSilent();
        if (!saveOk) {
          statusBadge.className = "terminal-status status-failed";
          statusBadge.textContent = "Lưu thất bại";
          appendTerminalLine("[LỖI HỆ THỐNG] Không thể lưu cấu hình — hủy chạy flow.", "error");
          stopBtn.disabled = true;
          closeBtn.disabled = false;
          runAllBtn.disabled = false;
          return;
        }
        appendTerminalLine("[✓] Đã lưu cấu hình thành công.", "success");
        statusBadge.textContent = "Đang khởi chạy...";
        stopBtn.disabled = false;

        try {
          // Gửi lệnh POST chạy flow
          const response = await fetch("/api/run-flows", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
          });
          const result = await response.json();

          if (!response.ok) {
            throw new Error(result.detail || "Không thể khởi động chạy flow");
          }

          appendTerminalLine(
            "[SYSTEM] Khởi chạy thành công. Bắt đầu nhận logs...",
            "success",
          );

          // Bắt đầu polling log
          startPolling();
        } catch (err) {
          statusBadge.className = "terminal-status status-failed";
          statusBadge.textContent = "Lỗi khởi động";
          appendTerminalLine(`[LỖI HỆ THỐNG] ${err.message}`, "error");
          stopBtn.disabled = true;
          closeBtn.disabled = false;
          runAllBtn.disabled = false;
        }
      }

      function startPolling() {
        if (pollInterval) clearInterval(pollInterval);
        pollInterval = setInterval(pollFlowStatus, 1000);
      }

      function stopPolling() {
        if (pollInterval) {
          clearInterval(pollInterval);
          pollInterval = null;
        }
      }

      async function pollFlowStatus() {
        const stopBtn = document.getElementById("btn-stop-flow");
        const closeBtn = document.getElementById("btn-close-terminal");
        const statusBadge = document.getElementById("terminal-status-badge");
        const runAllBtn = document.getElementById("btn-run-all");

        try {
          const response = await fetch(`/api/flow-status?offset=${logOffset}`);
          if (!response.ok) throw new Error("Mất kết nối với API");
          const status = await response.json();

          // Thêm các dòng log mới
          if (status.logs && status.logs.length > 0) {
            status.logs.forEach((line) => {
              let type = "info";
              if (
                line.includes("❌") ||
                line.includes(" LỖI ") ||
                line.includes(" ERROR ") ||
                line.includes("❌ [RCLONE] Lỗi")
              )
                type = "error";
              else if (
                line.includes("✅") ||
                line.includes(" thành công") ||
                line.includes(" hoàn tất")
              )
                type = "success";
              else if (
                line.includes("⚠️") ||
                line.includes(" CẢNH BÁO ") ||
                line.includes(" WARNING ")
              )
                type = "warning";
              appendTerminalLine(line, type);
            });
            logOffset += status.logs.length;
          }

          // Cập nhật trạng thái
          if (status.is_running) {
            statusBadge.className = "terminal-status status-running";
            statusBadge.textContent = "Đang chạy";
          } else {
            stopPolling();
            stopBtn.disabled = true;
            closeBtn.disabled = false;
            runAllBtn.disabled = false;

            if (status.returncode === 0) {
              statusBadge.className = "terminal-status status-success";
              statusBadge.textContent = "Hoàn thành";
              appendTerminalLine(
                "[SYSTEM] Tiến trình đã chạy hoàn tất thành công (exit code 0).",
                "success",
              );
            } else if (
              status.returncode === -15 ||
              status.returncode === -9 ||
              status.returncode === 3221225786
            ) {
              statusBadge.className = "terminal-status status-stopped";
              statusBadge.textContent = "Đã dừng";
              appendTerminalLine(
                "[SYSTEM] Tiến trình đã bị dừng cưỡng bức bởi người dùng.",
                "warning",
              );
            } else {
              statusBadge.className = "terminal-status status-failed";
              statusBadge.textContent = `Lỗi (code ${status.returncode})`;
              appendTerminalLine(
                `[SYSTEM] Tiến trình thất bại với mã lỗi ${status.returncode}.`,
                "error",
              );
            }
          }
        } catch (err) {
          appendTerminalLine(`[LỖI THĂM DÒ] ${err.message}`, "error");
        }
      }

      async function stopAllFlows() {
        const stopBtn = document.getElementById("btn-stop-flow");
        stopBtn.disabled = true;
        appendTerminalLine(
          "[SYSTEM] Đang gửi yêu cầu ngắt tiến trình...",
          "warning",
        );

        try {
          const response = await fetch("/api/stop-flows", { method: "POST" });
          const result = await response.json();
          if (response.ok) {
            appendTerminalLine("[SYSTEM] Lệnh dừng đã được gửi.", "success");
          } else {
            throw new Error(result.detail || "Không thể gửi lệnh dừng");
          }
        } catch (err) {
          appendTerminalLine(
            `[LỖI HỆ THỐNG] Không thể dừng: ${err.message}`,
            "error",
          );
          stopBtn.disabled = false;
        }
      }

      function closeTerminalModal() {
        document.getElementById("terminal-modal-backdrop").style.display =
          "none";
        stopPolling();
      }

      function appendTerminalLine(text, type = "info") {
        const terminalBody = document.getElementById("terminal-body");
        const lineDiv = document.createElement("div");
        lineDiv.className = `terminal-line ${type}`;
        lineDiv.textContent = text;
        terminalBody.appendChild(lineDiv);
        // Tự động cuộn xuống cuối
        terminalBody.scrollTop = terminalBody.scrollHeight;
      }

      function showToast(msg, type = "success") {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        toast.className = `toast ${type}`;

        const icon =
          type === "success"
            ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`
            : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;

        toast.innerHTML = `${icon} <span>${msg}</span>`;
        container.appendChild(toast);

        setTimeout(() => toast.classList.add("show"), 10);

        setTimeout(() => {
          toast.classList.remove("show");
          setTimeout(() => toast.remove(), 400);
        }, 3000);
      }

      // ── GDrive URLs Modal ─────────────────────────────────────────────
      function openGdriveModal() {
        renderGdriveTable();
        const backdrop = document.getElementById('gdrive-modal-backdrop');
        backdrop.style.display = 'flex';
      }

      function closeGdriveModal(event) {
        // Nếu click vào backdrop (nền mờ bên ngoài modal) thì mới đóng
        if (event && event.target !== document.getElementById('gdrive-modal-backdrop')) return;
        document.getElementById('gdrive-modal-backdrop').style.display = 'none';
      }

      function renderGdriveTable() {
        const urls = (configData.available_gdrive_urls || []);
        const tbody = document.getElementById('gdrive-table-body');
        const emptyMsg = document.getElementById('gdrive-empty');
        const table = document.getElementById('gdrive-table');

        tbody.innerHTML = '';

        if (urls.length === 0) {
          table.style.display = 'none';
          emptyMsg.style.display = 'block';
          return;
        }

        table.style.display = 'table';
        emptyMsg.style.display = 'none';

        urls.forEach((item) => {
          const name = item.name || '';
          const url = item.url || '';
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><span class="gdrive-name-badge">${escapeHtml(name)}</span></td>
            <td class="gdrive-url-cell">
              <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" title="Mở trong tab mới">${escapeHtml(url)}</a>
            </td>
            <td>
              <div class="gdrive-actions">
                <button class="btn-icon" title="Sao chép URL" onclick="copyGdriveUrl('${escapeJs(url)}', this)" style="color:#94a3b8">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                </button>
                <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" class="btn-icon" title="Mở GDrive" style="color:#60a5fa; display:flex; align-items:center">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path><polyline points="15 3 21 3 21 9"></polyline><line x1="10" y1="14" x2="21" y2="3"></line></svg>
                </a>
              </div>
            </td>
          `;
          tbody.appendChild(tr);
        });
      }

      function copyGdriveUrl(url, btn) {
        navigator.clipboard.writeText(url).then(() => {
          const original = btn.innerHTML;
          btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
          btn.style.color = '#10b981';
          setTimeout(() => { btn.innerHTML = original; btn.style.color = '#94a3b8'; }, 1500);
        }).catch(() => showToast('Không thể sao chép!', 'error'));
      }

      function escapeHtml(unsafe) {
        if (typeof unsafe !== "string") return unsafe;
        return unsafe
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function escapeJs(unsafe) {
        if (typeof unsafe !== "string") return unsafe;
        return unsafe.replace(/'/g, "\\'").replace(/"/g, '\\"');
      }
    </script>
  </body>
</html>
