<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Config Editor - Local Server</title>
  <style>
    :root {
      --bg-color: #0f111a;
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.1);
      --text-main: #e2e8f0;
      --text-muted: #94a3b8;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --danger: #ef4444;
      --success: #10b981;
      --input-bg: rgba(0, 0, 0, 0.2);
      --input-border: rgba(255, 255, 255, 0.2);
      --transition: all 0.2s ease-in-out;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.6;
      padding: 0;
      overflow-x: hidden;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 17, 26, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--card-border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.025em;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: var(--transition);
      font-size: 0.9rem;
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background-color: var(--primary-hover);
      box-shadow: 0 0 12px rgba(59, 130, 246, 0.5);
    }

    .btn-danger {
      background-color: rgba(239, 68, 68, 0.15);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .btn-danger:hover {
      background-color: var(--danger);
      color: white;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--input-border);
      color: var(--text-main);
    }
    .btn-outline:hover {
      background: var(--card-bg);
      border-color: var(--text-muted);
    }

    main {
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    #loading-indicator {
      text-align: center;
      padding: 4rem;
      font-size: 1.2rem;
      color: var(--text-muted);
    }

    .flow-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .flow-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 1.5rem;
      position: relative;
      transition: var(--transition);
      backdrop-filter: blur(8px);
    }

    .flow-card:hover {
      border-color: rgba(255, 255, 255, 0.25);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }

    .flow-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--card-border);
    }

    .flow-header h2 {
      font-size: 1.25rem;
      color: var(--primary);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    .form-control {
      width: 100%;
      padding: 0.6rem 0.8rem;
      background-color: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 6px;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      transition: var(--transition);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
    }

    /* Style dropdown options */
    option {
      background-color: var(--bg-color);
      color: var(--text-main);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .section-title {
      font-size: 1.1rem;
      margin-top: 1.5rem;
      margin-bottom: 1rem;
      color: #cbd5e1;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section-title::before {
      content: '';
      display: block;
      width: 4px;
      height: 1.1rem;
      background: var(--primary);
      border-radius: 2px;
    }

    /* Switch styling */
    .switch-wrapper {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    
    .switch {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
    }
    
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #475569;
      transition: .3s;
      border-radius: 34px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: var(--primary);
    }
    
    input:checked + .slider:before {
      transform: translateX(20px);
    }

    /* Dynamic Lists */
    .dynamic-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .dynamic-item {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }
    .dynamic-item .form-control {
      flex: 1;
    }
    .btn-icon {
      padding: 0.5rem;
      background: transparent;
      border: 1px solid var(--input-border);
      color: var(--text-muted);
      border-radius: 6px;
      cursor: pointer;
      transition: var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn-icon:hover {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }
    .btn-icon.danger:hover {
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
      border-color: rgba(239, 68, 68, 0.4);
    }

    .add-flow-wrapper {
      margin-top: 2rem;
      text-align: center;
    }

    /* Toast */
    #toast-container {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .toast {
      background: rgba(15, 17, 26, 0.95);
      border-left: 4px solid var(--success);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transform: translateX(120%);
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .toast.show {
      transform: translateX(0);
      opacity: 1;
    }
    .toast.error {
      border-left-color: var(--danger);
    }

  </style>
</head>
<body>

  <header>
    <h1>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
      Configs Editor
    </h1>
    <button class="btn btn-primary" onclick="saveConfig()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      Lưu Cấu Hình
    </button>
  </header>

  <main>
    <div id="loading-indicator">Đang tải dữ liệu cấu hình...</div>
    <div id="config-container" style="display: none;">
      <div class="flow-list" id="flow-list"></div>
      <div class="add-flow-wrapper">
        <button class="btn btn-outline" onclick="addFlow()">+ Thêm Flow Mới</button>
      </div>
    </div>
  </main>

  <div id="toast-container"></div>

  <script>
    let configData = { flows: [] };
    let availableFilters = [];

    // Khởi tạo
    document.addEventListener("DOMContentLoaded", fetchConfig);

    async function fetchConfig() {
      try {
        const [configRes, filtersRes] = await Promise.all([
          fetch('/api/configs'),
          fetch('/api/available-filters')
        ]);
        if (!configRes.ok) throw new Error('Không thể tải cấu hình');
        configData = await configRes.json();
        if (filtersRes.ok) {
          availableFilters = await filtersRes.json();
        }
        
        document.getElementById('loading-indicator').style.display = 'none';
        document.getElementById('config-container').style.display = 'block';
        
        renderFlows();
      } catch (error) {
        showToast(error.message, 'error');
        document.getElementById('loading-indicator').innerHTML = `<span style="color:var(--danger)">Lỗi: ${error.message}</span>`;
      }
    }

    function renderFlows() {
      const container = document.getElementById('flow-list');
      container.innerHTML = '';

      configData.flows.forEach((flow, index) => {
        const card = document.createElement('div');
        card.className = 'flow-card';
        card.innerHTML = `
          <div class="flow-header">
            <h2>Flow #${index + 1}: <span id="title-display-${index}" style="color:var(--text-main); font-weight:500; font-size:1.1rem">${flow.flow_title || 'Mới'}</span></h2>
            <button class="btn btn-danger" onclick="removeFlow(${index})">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
              Xóa Flow
            </button>
          </div>
          
          <div class="switch-wrapper">
            <label class="switch">
              <input type="checkbox" id="skip-${index}" ${flow.skip ? 'checked' : ''} onchange="updateFlowData(${index}, 'skip', this.checked)">
              <span class="slider"></span>
            </label>
            <span style="color:var(--text-muted); font-weight:500">Skip Flow (Bỏ qua luồng này)</span>
          </div>

          <div class="form-group">
            <label>Flow Title</label>
            <input type="text" class="form-control" value="${escapeHtml(flow.flow_title || '')}" oninput="updateTitleDisplay(${index}, this.value); updateFlowData(${index}, 'flow_title', this.value)">
          </div>

          <div class="form-group">
            <label>Local Data Input Path</label>
            <input type="text" class="form-control" value="${escapeHtml(flow.local_data_input || '')}" oninput="updateFlowData(${index}, 'local_data_input', this.value)">
          </div>

          <div class="grid-2">
            <div>
              <div class="section-title">Google Drive Config</div>
              <div class="form-group">
                <label>Upload Folder URL</label>
                <input type="text" class="form-control" value="${escapeHtml(flow.gdrive?.upload_gdrive_folder_url || '')}" oninput="updateNestedFlowData(${index}, 'gdrive', 'upload_gdrive_folder_url', this.value)">
              </div>
              <div class="form-group">
                <label>Rclone Config Path</label>
                <input type="text" class="form-control" value="${escapeHtml(flow.gdrive?.rclone_config_path || '')}" oninput="updateNestedFlowData(${index}, 'gdrive', 'rclone_config_path', this.value)">
              </div>
            </div>

            <div>
              <div class="section-title">Kaggle Config</div>
              <div class="form-group">
                <label>Notebook to Execute</label>
                <input type="text" class="form-control" value="${escapeHtml(flow.kaggle?.notebook_to_execute || '')}" oninput="updateNestedFlowData(${index}, 'kaggle', 'notebook_to_execute', this.value)">
              </div>
              <div class="form-group">
                <label>Credentials Path (.env)</label>
                <input type="text" class="form-control" value="${escapeHtml(flow.kaggle?.credentials_path || '')}" oninput="updateNestedFlowData(${index}, 'kaggle', 'credentials_path', this.value)">
              </div>
            </div>
          </div>

          <div class="grid-2">
            <div>
              <div class="section-title">
                Entrance Filters
                <button class="btn-icon" style="margin-left:auto; padding:0.2rem 0.5rem" onclick="addEntranceFilter(${index})">+</button>
              </div>
              <div class="dynamic-list" id="filters-list-${index}">
                <!-- Rendered in JS -->
              </div>
            </div>
            
            <div>
              <div class="section-title">
                Edit Variables (Kaggle)
                <button class="btn-icon" style="margin-left:auto; padding:0.2rem 0.5rem" onclick="addEditVar(${index})">+</button>
              </div>
              <div class="dynamic-list" id="edit-vars-list-${index}">
                <!-- Rendered in JS -->
              </div>
            </div>
          </div>
        `;
        container.appendChild(card);

        // Render dynamic lists
        renderEntranceFilters(index);
        renderEditVars(index);
      });
    }

    function renderEntranceFilters(flowIndex) {
      const container = document.getElementById(`filters-list-${flowIndex}`);
      container.innerHTML = '';
      const filters = configData.flows[flowIndex].entrance_filters || [];
      
      if (filters.length === 0) {
        container.innerHTML = `<span style="color:var(--text-muted); font-size:0.9rem; font-style:italic">Chưa có filter nào</span>`;
      }

      filters.forEach((filter, filterIndex) => {
        let optionsHtml = '<option value="">-- Chọn Filter --</option>';
        availableFilters.forEach(f => {
          const selected = (f === filter.name) ? 'selected' : '';
          optionsHtml += `<option value="${escapeHtml(f)}" ${selected}>${escapeHtml(f)}</option>`;
        });
        
        if (filter.name && !availableFilters.includes(filter.name)) {
           optionsHtml += `<option value="${escapeHtml(filter.name)}" selected>${escapeHtml(filter.name)} (Lỗi: Không tồn tại)</option>`;
        }

        const div = document.createElement('div');
        div.className = 'dynamic-item';
        div.innerHTML = `
          <select class="form-control" onchange="updateFilterName(${flowIndex}, ${filterIndex}, this.value)">
            ${optionsHtml}
          </select>
          <button class="btn-icon danger" onclick="removeEntranceFilter(${flowIndex}, ${filterIndex})" title="Xóa filter">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        `;
        container.appendChild(div);
      });
    }

    function renderEditVars(flowIndex) {
      const container = document.getElementById(`edit-vars-list-${flowIndex}`);
      container.innerHTML = '';
      const kaggle = configData.flows[flowIndex].kaggle || {};
      const editVars = kaggle.edit_vars || {};
      const keys = Object.keys(editVars);

      if (keys.length === 0) {
        container.innerHTML = `<span style="color:var(--text-muted); font-size:0.9rem; font-style:italic">Chưa có biến nào</span>`;
      }

      keys.forEach((key) => {
        const div = document.createElement('div');
        div.className = 'dynamic-item';
        div.innerHTML = `
          <input type="text" class="form-control" style="flex:0.8" value="${escapeHtml(key)}" placeholder="Key" onchange="updateEditVarKey(${flowIndex}, '${escapeJs(key)}', this.value)">
          <input type="text" class="form-control" style="flex:1.2" value="${escapeHtml(editVars[key])}" placeholder="Value" oninput="updateEditVarValue(${flowIndex}, '${escapeJs(key)}', this.value)">
          <button class="btn-icon danger" onclick="removeEditVar(${flowIndex}, '${escapeJs(key)}')" title="Xóa biến">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        `;
        container.appendChild(div);
      });
    }

    // --- Data Updaters ---
    function updateTitleDisplay(index, val) {
      document.getElementById(`title-display-${index}`).textContent = val || 'Mới';
    }

    function updateFlowData(index, field, value) {
      configData.flows[index][field] = value;
    }

    function updateNestedFlowData(index, parentField, field, value) {
      if (!configData.flows[index][parentField]) {
        configData.flows[index][parentField] = {};
      }
      configData.flows[index][parentField][field] = value;
    }

    // Filters
    function addEntranceFilter(flowIndex) {
      if (!configData.flows[flowIndex].entrance_filters) configData.flows[flowIndex].entrance_filters = [];
      configData.flows[flowIndex].entrance_filters.push({ name: "" });
      renderEntranceFilters(flowIndex);
    }
    function updateFilterName(flowIndex, filterIndex, val) {
      configData.flows[flowIndex].entrance_filters[filterIndex].name = val;
    }
    function removeEntranceFilter(flowIndex, filterIndex) {
      configData.flows[flowIndex].entrance_filters.splice(filterIndex, 1);
      renderEntranceFilters(flowIndex);
    }

    // Edit Vars
    function addEditVar(flowIndex) {
      if (!configData.flows[flowIndex].kaggle) configData.flows[flowIndex].kaggle = {};
      if (!configData.flows[flowIndex].kaggle.edit_vars) configData.flows[flowIndex].kaggle.edit_vars = {};
      
      let newKey = "NEW_VAR";
      let counter = 1;
      while (configData.flows[flowIndex].kaggle.edit_vars.hasOwnProperty(newKey)) {
        newKey = `NEW_VAR_${counter++}`;
      }
      configData.flows[flowIndex].kaggle.edit_vars[newKey] = "";
      renderEditVars(flowIndex);
    }
    function updateEditVarKey(flowIndex, oldKey, newKey) {
      if (oldKey === newKey) return;
      const vars = configData.flows[flowIndex].kaggle.edit_vars;
      if (vars.hasOwnProperty(newKey)) {
        showToast("Key này đã tồn tại!", "error");
        renderEditVars(flowIndex);
        return;
      }
      vars[newKey] = vars[oldKey];
      delete vars[oldKey];
      renderEditVars(flowIndex); // Phải render lại để DOM map với key mới
    }
    function updateEditVarValue(flowIndex, key, val) {
      configData.flows[flowIndex].kaggle.edit_vars[key] = val;
    }
    function removeEditVar(flowIndex, key) {
      delete configData.flows[flowIndex].kaggle.edit_vars[key];
      renderEditVars(flowIndex);
    }

    // Flows array
    function addFlow() {
      configData.flows.push({
        skip: false,
        flow_title: "Flow mới",
        entrance_filters: [],
        local_data_input: "",
        gdrive: { upload_gdrive_folder_url: "", rclone_config_path: "" },
        kaggle: { notebook_to_execute: "", edit_vars: {}, credentials_path: "" }
      });
      renderFlows();
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
    function removeFlow(index) {
      if(confirm("Bạn có chắc chắn muốn xóa Flow này?")) {
        configData.flows.splice(index, 1);
        renderFlows();
      }
    }

    // --- Save & Helpers ---
    async function saveConfig() {
      try {
        const response = await fetch('/api/configs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(configData)
        });
        const result = await response.json();
        
        if (response.ok) {
          showToast("Đã lưu cấu hình thành công!");
        } else {
          showToast(result.detail || "Lỗi khi lưu", "error");
        }
      } catch (e) {
        showToast("Lỗi mạng: " + e.message, "error");
      }
    }

    function showToast(msg, type = 'success') {
      const container = document.getElementById('toast-container');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      const icon = type === 'success' 
        ? `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`
        : `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;

      toast.innerHTML = `${icon} <span>${msg}</span>`;
      container.appendChild(toast);
      
      // Trigger animation
      setTimeout(() => toast.classList.add('show'), 10);
      
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400);
      }, 3000);
    }

    function escapeHtml(unsafe) {
      if (typeof unsafe !== 'string') return unsafe;
      return unsafe
           .replace(/&/g, "&amp;")
           .replace(/</g, "&lt;")
           .replace(/>/g, "&gt;")
           .replace(/"/g, "&quot;")
           .replace(/'/g, "&#039;");
    }
    
    function escapeJs(unsafe) {
      if (typeof unsafe !== 'string') return unsafe;
      return unsafe.replace(/'/g, "\\'").replace(/"/g, "\\\"");
    }
  </script>
</body>
</html>
